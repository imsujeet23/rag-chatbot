version: '3.8'

services:
  rag-api:
    build: .
    container_name: rag-chatbot-api
    ports:
      - "8000:8000"
    volumes:
      - ./uploads:/app/uploads
      - ./vector_store:/app/vector_store
      - ./models:/app/models
    environment:
      - DEBUG=False
      - API_HOST=0.0.0.0
      - API_PORT=8000
      - EMBEDDING_MODEL=sentence-transformers/all-MiniLM-L6-v2
      - LLM_MODEL=TinyLlama/TinyLlama-1.1B-Chat-v1.0
      - LLM_DEVICE=cpu
      - CHUNK_SIZE=1000
      - CHUNK_OVERLAP=200
      - LOG_LEVEL=INFO
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
