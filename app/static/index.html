<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>RAG Chatbot</title>
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <aside class="sidebar" aria-label="Document controls">
        <section class="brand">
          <div class="brand-mark">R</div>
          <div>
            <h1>RAG Chatbot</h1>
            <p>Ask questions grounded in your uploaded documents.</p>
          </div>
        </section>

        <section class="panel status-panel" aria-labelledby="status-title">
          <div class="section-heading">
            <h2 id="status-title">System</h2>
            <button id="refreshStatus" class="icon-button" type="button">Refresh</button>
          </div>
          <div id="componentStatus" class="status-grid" aria-live="polite"></div>
          <div id="indexStats" class="stats-grid" aria-live="polite"></div>
        </section>

        <section class="panel" aria-labelledby="upload-title">
          <div class="section-heading">
            <h2 id="upload-title">Documents</h2>
          </div>
          <form id="uploadForm" class="upload-box">
            <input id="documentFile" name="file" type="file" accept=".pdf,.txt" />
            <label for="documentFile">
              <span class="upload-title">Drop in a PDF or TXT</span>
              <span id="fileName" class="upload-subtitle">Choose a file to index</span>
            </label>
            <button id="uploadButton" class="primary-button" type="submit">Upload and index</button>
          </form>
          <p id="uploadMessage" class="form-message" aria-live="polite"></p>
        </section>

        <section class="panel settings-panel" aria-labelledby="settings-title">
          <div class="section-heading">
            <h2 id="settings-title">Retrieval</h2>
          </div>
          <label class="field">
            <span>Source chunks</span>
            <input id="topK" type="number" min="1" max="20" value="5" />
          </label>
          <label class="field">
            <span>Answer length</span>
            <input id="maxLength" type="number" min="64" max="1024" step="64" value="512" />
          </label>
          <button id="clearIndex" class="secondary-button danger" type="button">Clear index</button>
        </section>
      </aside>

      <section class="chat-area" aria-label="Chat">
        <header class="chat-header">
          <div>
            <p class="eyebrow">Document Q&amp;A</p>
            <h2>Chat with your knowledge base</h2>
          </div>
          <a class="docs-link" href="/docs" target="_blank" rel="noreferrer">API docs</a>
        </header>

        <div id="chatMessages" class="chat-messages" aria-live="polite">
          <article class="message assistant">
            <div class="avatar">AI</div>
            <div class="bubble">
              <p>Upload documents, then ask a question. I'll answer using the indexed chunks and show the sources I used.</p>
            </div>
          </article>
        </div>

        <form id="chatForm" class="composer">
          <textarea id="questionInput" rows="2" placeholder="Ask about your uploaded documents..." required></textarea>
          <button id="sendButton" class="primary-button" type="submit">Send</button>
        </form>
      </section>
    </main>

    <script src="/static/app.js"></script>
  </body>
</html>
